name: VankinyZametki
options:
  bundleIdPrefix: com.vankiny
  deploymentTarget:
    iOS: "18.0"
    macOS: "14.0"
  generateEmptyDirectories: true

targets:
  VankinyZametki:
    type: application
    platform: iOS
    sources:
      - VankinyZametki
      - Shared
    settings:
      base:
        INFOPLIST_FILE: VankinyZametki/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.vankiny.zametki
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTED_PLATFORMS: iphoneos
        SUPPORTS_MACCATALYST: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  VankinyZametkiMac:
    type: application
    platform: macOS
    sources:
      - path: VankinyZametki/Models
      - path: VankinyZametki/Services/APIService.swift
      - path: VankinyZametki/Services/NoteStore.swift
      - path: VankinyZametki/Services/FolderStore.swift
      - path: VankinyZametki/Services/NoteProcessingService.swift
      - path: VankinyZametki/Services/TagStore.swift
      - path: VankinyZametki/Utils/Config.swift
      - path: VankinyZametkiMac
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: VankinyZametkiMac/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.vankiny.zametki.mac
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SUPPORTED_PLATFORMS: macosx
